<section class="page">


<h1>Contact Me</h1>


<form id="contact-form">

<input 
type="text"
name="name"
placeholder="Name"
required>


<input
type="email"
name="email"
placeholder="Email"
required>


<textarea
name="message"
placeholder="Message"
required>
</textarea>


<button type="submit">
Send Message
</button>

</form>

</section>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="script.js">

emailjs.init({
    publicKey: "zHvI62Fhz8VFDt1Jy"
});


document
.getElementById("contact-form")
.addEventListener("submit", function(e){

e.preventDefault();


emailjs.sendForm(

"service_46dptr8",

"template_dv7x87i",

this

)

.then(function(response){

console.log("SUCCESS", response);

alert("Message Sent Successfully ✅");


document
.getElementById("contact-form")
.reset();


}, function(error){


console.log("FAILED", error);


alert("Message Failed ❌ Check Console");


});


});

</script>
